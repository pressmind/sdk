services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pressmind_test
    ports:
      - "13306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /var/lib/mysql

  mongodb:
    image: mongo:7
    ports:
      - "17017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 5s
      timeout: 3s
      retries: 10
    tmpfs:
      - /data/db

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  opensearch:
    image: opensearchproject/opensearch:2.11.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      # Allow index creation via API (default; explicit for clarity)
      action.auto_create_index: "true"
      # Limit heap so container has predictable memory and avoids cluster block under load
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "19200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 45s
    # Ensure enough memory so cluster does not block index creation (403)
    mem_limit: 2g

  unit:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    # Use path so all tests under tests/Unit/ are discovered (recursive)
    command: ["tests/Unit/", "--no-coverage", "--colors=always", "--testdox", "--display-skipped", "--display-incomplete"]

  integration:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: pressmind_test
      DB_USER: root
      DB_PASS: root
      DB_PORT: "3306"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: pressmind_test
      OPENSEARCH_URI: http://opensearch:9200
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    entrypoint: ["sh", "-c"]
    command:
      - "export OPENSEARCH_URI=$${OPENSEARCH_URI:-http://opensearch:9200} && exec vendor/bin/phpunit -d memory_limit=512M --testsuite Integration --no-coverage --colors=always --testdox --display-skipped --display-incomplete"

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_NAME: pressmind_test
      DB_USER: root
      DB_PASS: root
      DB_PORT: "3306"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: pressmind_test
      OPENSEARCH_URI: http://opensearch:9200
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    entrypoint: ["sh", "-c"]
    command:
      - "export OPENSEARCH_URI=$${OPENSEARCH_URI:-http://opensearch:9200} && exec vendor/bin/phpunit -d memory_limit=512M --no-coverage --colors=always --testdox --display-skipped --display-incomplete"

  import-test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_NAME: pressmind_test
      DB_USER: root
      DB_PASS: root
      DB_PORT: "3306"
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: pressmind_test
      PM_API_KEY: "${PM_API_KEY:-}"
      PM_API_USER: "${PM_API_USER:-}"
      PM_API_PASSWORD: "${PM_API_PASSWORD:-}"
    command: ["--testsuite", "ImportIntegration", "--no-coverage", "--colors=always", "--testdox", "--display-skipped", "--display-incomplete"]
